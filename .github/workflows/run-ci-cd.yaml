name: Run CI/CD

on:
  merge_group:
  pull_request:
    branches:
      - dev
      - feature/**
      - main
  push:
    branches:
      - dev
      - feature/**
      - main
  release:
    types:
      - published
  schedule:
    - cron: 0 2 * * *  # Run staging deploy daily at 2am UTC.
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  run-code-quality-checks:
    name: Run code quality checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-code-quality-checks.yaml

  run-backend-tests:
    name: Run backend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: write
      contents: read
      id-token: write
    uses: ./.github/workflows/run-backend-tests.yaml

  run-frontend-tests:
    name: Run frontend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/run-frontend-tests.yaml

  run-frontend-e2e-tests:
    name: Run frontend e2e tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: nest_db_e2e
          POSTGRES_PASSWORD: nest_user_e2e_password
          POSTGRES_USER: nest_user_e2e
        options: >-
          --health-cmd="pg_isready -U nest_user_e2e -d nest_db_e2e -h localhost -p 5432"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      cache:
        image: redis:8.0.5-alpine3.21
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-retries=5
          --health-timeout=5s
        ports:
          - 6379:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Setup Backend environment
        uses: ./.github/actions/setup-backend-environment
        with:
          backend_port: 9000
          db_name: nest_db_e2e
          db_password: nest_user_e2e_password
          db_username: nest_user_e2e
          env_file: .env.e2e.example

      - name: Build frontend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          build-args: |
            ENV_FILE=.env.e2e.example
            NEXT_PUBLIC_E2E_BACKEND_BASE_URL=http://localhost:9000
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-e2e-cache
          cache-to: |
            type=gha,compression=zstd
          context: frontend
          file: docker/frontend/Dockerfile
          load: true
          platforms: linux/amd64
          tags: owasp/nest:frontend-e2e-latest

      - name: Run frontend in the background
        run: |
          docker run \
            --env-file frontend/.env.e2e.example \
            --name e2e-nest-frontend \
            --network host \
            -d \
            -e NEXT_SERVER_CSRF_URL=http://localhost:9000/csrf/ \
            -e NEXT_SERVER_GRAPHQL_URL=http://localhost:9000/graphql/ \
            -p 3000:3000 \
            owasp/nest:frontend-e2e-latest

      - name: Wait for frontend to be ready
        run: |
          timeout 5m bash -c '
            until wget --spider http://localhost:3000/; do
              echo "Waiting for the frontend..."
              sleep 5
            done
          '
          echo "Frontend is up!"

      - name: Build e2e testing image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-e2e-tests-cache
          cache-to: |
            type=gha,compression=zstd
          context: .
          file: docker/e2e/Dockerfile
          load: true
          platforms: linux/amd64
          tags: owasp/nest:test-frontend-e2e-latest

      - name: Run frontend end-to-end tests
        run: |
          docker run \
            --network host \
            -e FRONTEND_URL=http://localhost:3000 \
            owasp/nest:test-frontend-e2e-latest pnpm run test:e2e
    timeout-minutes: 20

  run-graphql-fuzz-tests:
    name: Run GraphQL fuzz tests
    if: false
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: graphql_test.py

  run-rest-fuzz-tests:
    name: Run REST fuzz tests
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: rest_test.py
      rest-url: http://localhost:9500/api/v0

  run-infrastructure-tests:
    name: Run Infrastructure tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-infrastructure-tests.yaml

  set-release-version:
    name: Set release version
    if: |
      github.repository == 'OWASP/Nest' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && github.event.action == 'published')
      )
    needs:
      - run-backend-tests
      - run-frontend-tests
      - run-frontend-e2e-tests
      - run-infrastructure-tests
      - run-rest-fuzz-tests
    outputs:
      release_version: ${{ steps.set.outputs.release_version }}
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Set release version
        id: set
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "release_version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "release_version=$(date '+%y.%-m.%-d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
    timeout-minutes: 5

  run-staging:
    name: Run staging workflow
    needs: set-release-version
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    uses: ./.github/workflows/run-staging.yaml
    with:
      release_version: ${{ needs.set-release-version.outputs.release_version }}

  build-production-images:
    name: Build Production Images
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - set-release-version
    permissions:
      contents: read
    uses: ./.github/workflows/run-build-images.yaml
    with:
      release_version: ${{ needs.set-release-version.outputs.release_version }}
      aws_role_session_name: GitHubActions-BuildProductionImages
      aws_role_to_assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform
      backend_tag: owasp/nest:backend-production
      backend_cache_ref: owasp/nest:backend-production-cache
      backend_uid: '1002'
      backend_gid: '1002'
      backend_ecr_repo: nest-production-backend
      frontend_tag: owasp/nest:frontend-production
      frontend_cache_ref: owasp/nest:frontend-production-cache
      frontend_ecr_repo: nest-production-frontend
    secrets: inherit

  scan-production-images:
    name: Scan Production Images
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - build-production-images
      - set-release-version
    permissions:
      contents: write
    uses: ./.github/workflows/run-scan-images.yaml
    with:
      release_version: ${{ needs.set-release-version.outputs.release_version }}
      backend_image_name: owasp/nest:backend-production
      frontend_image_name: owasp/nest:frontend-production
      upload_to_release: true
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  bootstrap-nest-production-infrastructure:
    name: Bootstrap Nest Production Infrastructure
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - scan-production-images
    permissions:
      contents: read
    uses: ./.github/workflows/run-bootstrap-infrastructure.yaml
    secrets: inherit

  deploy-production-nest:
    name: Plan and Deploy Nest Production
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - bootstrap-nest-production-infrastructure
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-ProductionDeploy
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.TF_STATE_BUCKET_NAME }}
          TF_STATE_KEY: production/terraform.tfstate
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          key="${TF_STATE_KEY}"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AVAILABILITY_ZONES: ${{ vars.AWS_AVAILABILITY_ZONES }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          BACKEND_USE_FARGATE_SPOT: false
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          DJANGO_CONFIGURATION: Production
          DJANGO_SETTINGS_MODULE: settings.production
          ENABLE_ADDITIONAL_PARAMETERS: true
          ENABLE_CRON_TASKS: true
          ENABLE_NAT_GATEWAY: true
          ENABLE_RDS_PROXY: true
          ENVIRONMENT: production
          FRONTEND_USE_FARGATE_SPOT: false
          PROJECT_NAME: nest
          RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
          TASKS_USE_FARGATE_SPOT: false
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfvars <<-EOF
          availability_zones=$AVAILABILITY_ZONES
          aws_region="$AWS_REGION"
          backend_image_tag="$RELEASE_VERSION"
          backend_use_fargate_spot=$BACKEND_USE_FARGATE_SPOT
          domain_name="$DOMAIN_NAME"
          django_configuration="$DJANGO_CONFIGURATION"
          django_release_version="$RELEASE_VERSION"
          django_settings_module="$DJANGO_SETTINGS_MODULE"
          enable_additional_parameters=$ENABLE_ADDITIONAL_PARAMETERS
          enable_cron_tasks=$ENABLE_CRON_TASKS
          enable_nat_gateway=$ENABLE_NAT_GATEWAY
          enable_rds_proxy=$ENABLE_RDS_PROXY
          environment="$ENVIRONMENT"
          frontend_use_fargate_spot=$FRONTEND_USE_FARGATE_SPOT
          frontend_image_tag="$RELEASE_VERSION"
          project_name="$PROJECT_NAME"
          tasks_use_fargate_spot=$TASKS_USE_FARGATE_SPOT
          EOF

      - name: Terraform Init
        working-directory: infrastructure/live
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/live
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/live
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/live
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/live
        run: terraform apply -auto-approve tfplan

      - name: Capture terraform outputs
        id: tf-outputs
        working-directory: infrastructure/live
        run: |
          echo "backend_cluster_name=$(terraform output -raw backend_cluster_name)" >> $GITHUB_OUTPUT
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_cluster_name=$(terraform output -raw frontend_cluster_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "nat_gateway_enabled=$(terraform output -raw nat_gateway_enabled)" >> $GITHUB_OUTPUT
          echo "tasks_cluster_name=$(terraform output -raw tasks_cluster_name)" >> $GITHUB_OUTPUT
          echo "tasks_security_group_id=$(terraform output -raw tasks_security_group_id)" >> $GITHUB_OUTPUT
          echo "tasks_subnet_ids=$(terraform output -json tasks_subnet_ids | jq -r 'join(",")')" >> $GITHUB_OUTPUT

      - name: Run ECS migrate task
        id: migrate-task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASK_DEFINITION: nest-production-migrate
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migrate task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}"

      - name: Check migrate task exit code
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrate task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrate task completed successfully"

      - name: Run ECS index-data task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASK_DEFINITION: nest-production-index-data
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          RESPONSE=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}")

          FAILURE_COUNT=$(echo "$RESPONSE" | jq '.failures | length')
          TASK_COUNT=$(echo "$RESPONSE" | jq '.tasks | length')

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned failures:"
            echo "$RESPONSE" | jq '.failures'
            exit 1
          fi

          if [ "$TASK_COUNT" -eq 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned no tasks"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Index-data task started successfully (runs async, ~30 min)"

      - name: Wait for backend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.backend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.backend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

      - name: Wait for frontend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.frontend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.frontend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

  run-production-lighthouse-ci:
    name: Run production Lighthouse CI
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          run_install: false
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Run lighthouse-ci
        env:
          LHCI_BASE_URL: https://nest.owasp.org
        run: |
          pnpm run lighthouse-ci
        working-directory: frontend
    timeout-minutes: 5

  run-production-zap-baseline-scan:
    name: Run production ZAP baseline scan
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25  # v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: https://nest.owasp.org
          allow_issue_writing: false
          fail_action: true
          cmd_options: -a -c .zapconfig -r report_html.html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zap-baseline-scan-report-${{ github.run_id }}
          path: report_html.html
    timeout-minutes: 5
