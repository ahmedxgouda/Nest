name: Run staging workflow

on:
  workflow_call:
    inputs:
      release_version:
        description: The release version to set
        required: true
        type: string

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  build-images:
    name: Build images
    permissions:
      contents: read
    uses: ./.github/workflows/run-build-images.yaml
    with:
      release_version: ${{ inputs.release_version }}
      aws_role_session_name: GitHubActions-BuildStagingImages
      aws_role_name: nest-staging-terraform
      backend_tag: owasp/nest:backend-staging
      backend_cache_ref: owasp/nest:backend-staging-cache
      backend_uid: '1001'
      backend_gid: '1001'
      backend_ecr_repo: nest-staging-backend
      frontend_tag: owasp/nest:frontend-staging
      frontend_cache_ref: owasp/nest:frontend-staging-cache
      frontend_ecr_repo: nest-staging-frontend
    secrets: inherit

  scan-images:
    name: Scan images
    needs:
      - build-images
    permissions:
      contents: write
    uses: ./.github/workflows/run-scan-images.yaml
    with:
      release_version: ${{ inputs.release_version }}
      backend_image_name: owasp/nest:backend-staging
      frontend_image_name: owasp/nest:frontend-staging
      upload_to_release: false
      sbom_artifact_name: staging-sbom-${{ inputs.release_version }}
    secrets: inherit

  bootstrap-nest-staging-infrastructure:
    name: Bootstrap Nest Staging Infrastructure
    if: |
      (github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'))
    needs:
      - scan-images
    permissions:
      contents: read
    uses: ./.github/workflows/run-bootstrap-infrastructure.yaml
    secrets: inherit

  deploy-staging-nest:
    name: Plan and Deploy Nest Staging
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: staging
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - bootstrap-nest-staging-infrastructure
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-StagingDeploy
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-staging-terraform

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.TF_STATE_BUCKET_NAME }}
          TF_STATE_KEY: staging/terraform.tfstate
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          key="${TF_STATE_KEY}"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AVAILABILITY_ZONES: ${{ vars.AWS_AVAILABILITY_ZONES }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          BACKEND_USE_FARGATE_SPOT: true
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          DJANGO_CONFIGURATION: Staging
          DJANGO_SETTINGS_MODULE: settings.staging
          ENABLE_CRON_TASKS: false
          ENABLE_NAT_GATEWAY: false
          ENABLE_RDS_PROXY: false
          ENVIRONMENT: staging
          FRONTEND_USE_FARGATE_SPOT: true
          PROJECT_NAME: nest
          RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
          TASKS_USE_FARGATE_SPOT: true
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfvars <<-EOF
          availability_zones=$AVAILABILITY_ZONES
          aws_region="$AWS_REGION"
          backend_image_tag="$RELEASE_VERSION"
          backend_use_fargate_spot=$BACKEND_USE_FARGATE_SPOT
          domain_name="$DOMAIN_NAME"
          django_configuration="$DJANGO_CONFIGURATION"
          django_release_version="$RELEASE_VERSION"
          django_settings_module="$DJANGO_SETTINGS_MODULE"
          enable_cron_tasks=$ENABLE_CRON_TASKS
          enable_nat_gateway=$ENABLE_NAT_GATEWAY
          enable_rds_proxy=$ENABLE_RDS_PROXY
          environment="$ENVIRONMENT"
          frontend_use_fargate_spot=$FRONTEND_USE_FARGATE_SPOT
          frontend_image_tag="$RELEASE_VERSION"
          project_name="$PROJECT_NAME"
          tasks_use_fargate_spot=$TASKS_USE_FARGATE_SPOT
          EOF

      - name: Terraform Init
        working-directory: infrastructure/live
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/live
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/live
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/live
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/live
        run: terraform apply -auto-approve tfplan

      - name: Capture terraform outputs
        id: tf-outputs
        working-directory: infrastructure/live
        run: |
          echo "backend_cluster_name=$(terraform output -raw backend_cluster_name)" >> $GITHUB_OUTPUT
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_cluster_name=$(terraform output -raw frontend_cluster_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "nat_gateway_enabled=$(terraform output -raw nat_gateway_enabled)" >> $GITHUB_OUTPUT
          echo "tasks_cluster_name=$(terraform output -raw tasks_cluster_name)" >> $GITHUB_OUTPUT
          echo "tasks_security_group_id=$(terraform output -raw tasks_security_group_id)" >> $GITHUB_OUTPUT
          echo "tasks_subnet_ids=$(terraform output -json tasks_subnet_ids | jq -r 'join(",")')" >> $GITHUB_OUTPUT

      - name: Run ECS migrate task
        id: migrate-task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASK_DEFINITION: nest-staging-migrate
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migrate task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}"

      - name: Check migrate task exit code
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrate task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrate task completed successfully"

      - name: Run ECS index-data task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASK_DEFINITION: nest-staging-index-data
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          RESPONSE=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}")

          FAILURE_COUNT=$(echo "$RESPONSE" | jq '.failures | length')
          TASK_COUNT=$(echo "$RESPONSE" | jq '.tasks | length')

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned failures:"
            echo "$RESPONSE" | jq '.failures'
            exit 1
          fi

          if [ "$TASK_COUNT" -eq 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned no tasks"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Index-data task started successfully (runs async, ~30 min)"

      - name: Wait for backend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.backend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.backend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

      - name: Wait for frontend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.frontend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.frontend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"
    timeout-minutes: 60

  run-staging-lighthouse-ci:
    name: Run staging Lighthouse CI
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          run_install: false
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Run lighthouse-ci
        env:
          LHCI_BASE_URL: https://nest.owasp.dev
        run: |
          pnpm run lighthouse-ci
        working-directory: frontend
    timeout-minutes: 5

  run-staging-zap-baseline-scan:
    name: Run staging ZAP baseline scan
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25  # v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: https://nest.owasp.dev
          allow_issue_writing: false
          fail_action: true
          cmd_options: -a -c .zapconfig -r report_html.html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zap-baseline-scan-report-${{ github.run_id }}
          path: report_html.html
    timeout-minutes: 5
